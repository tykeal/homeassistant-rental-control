---
ignore:
  # pillow transitive dependency via homeassistant — PSD
  # out-of-bounds write (CVE-2026-25990), fixed in 12.1.1.
  # We cannot pin pillow directly because it comes from
  # homeassistant.
  # pillow transitive dependency via homeassistant —
  # buffer over-read in PcxDecode (CVE-2025-2312).
  - vulnerability: GHSA-4xh5-x5gv-qwph
    package:
      name: pillow
      type: python

  - vulnerability: GHSA-cfh3-3jmp-rvhc
    package:
      name: pillow
      type: python

  # orjson transitive dependency via homeassistant —
  # unlimited recursion depth in orjson.dumps, fixed in
  # 3.11.6. We cannot pin orjson directly because it
  # comes from homeassistant.
  - vulnerability: GHSA-hx9q-6w63-j58v
    package:
      name: orjson
      type: python

  # PyJWT transitive dependency via homeassistant —
  # accepts unknown crit header extensions
  # (CVE-2026-32597). We cannot pin PyJWT directly
  # because it comes from homeassistant.
  - vulnerability: GHSA-752w-5fwx-jx9f
    package:
      name: PyJWT
      type: python
