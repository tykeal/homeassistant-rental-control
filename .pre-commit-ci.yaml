#
# pre-commit.ci runs Python 3.12 which cannot parse Python 3.14 syntax
# (PEP 758 unparenthesized except). Skip hooks that invoke ast.parse,
# type-check, or reformat source targeting py314; they still run locally
# and in GitHub Actions on Python 3.14.

ci:
  skip:
    - ruff-format
    - interrogate
    - mypy
