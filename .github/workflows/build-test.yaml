---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2021 Andrew Grimberg <tykeal@bardicgrove.org>

# Runs on a new pull request, performs build and runs tests
name: 'Python Build/Test'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      clear_cache:
        description: 'Clear all Python dependency caches'
        type: boolean
        default: false
        required: false
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  repository-metadata:
    name: "Repository Metadata"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 5
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: "Gather repository metadata"
        id: repo-metadata
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/repository-metadata-action@ceabcd987d13d7bfefd2372e01eebb0ddac45956  # v0.2.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_summary: 'true'
          gerrit_summary: 'false'
          artifact_upload: 'true'
          artifact_formats: 'json'

  clear-cache:
    name: 'Clear Python Caches'
    if: >-
      github.event_name == 'workflow_dispatch'
      && github.event.inputs.clear_cache == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    timeout-minutes: 5
    env:
      GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Clear Python dependency caches'
        env:
          REPO: "${{ github.repository }}"
        run: |
          # Clear Python dependency caches
          echo "Clearing Python dependency caches 🗑️"
          deleted=0
          failed=0
          for prefix in python- setup-python- setup-uv-; do
            while true; do
              if ! keys=$(gh cache list --repo "$REPO" \
                --key "$prefix" --limit 100 \
                --json key --jq '.[].key' 2>&1); then
                echo "::warning::Failed to list caches" \
                  "for prefix '$prefix': $keys"
                echo "Warning: failed to list caches for" \
                  "prefix \`$prefix\`: $keys" \
                  >> "$GITHUB_STEP_SUMMARY"
                failed=1
                break
              fi
              [ -n "$keys" ] || break

              batch_deleted=0
              while IFS= read -r key; do
                [ -n "$key" ] || continue
                if delete_out=$(gh cache delete "$key" \
                  --repo "$REPO" 2>&1); then
                  echo "Deleted cache: $key"
                  deleted=$((deleted + 1))
                  batch_deleted=$((batch_deleted + 1))
                else
                  echo "::warning::Failed to delete" \
                    "cache '$key': $delete_out"
                  echo "Warning: failed to delete cache" \
                    "\`$key\`: $delete_out" \
                    >> "$GITHUB_STEP_SUMMARY"
                  failed=1
                fi
              done <<< "$keys"

              [ "$batch_deleted" -gt 0 ] || break
            done
          done
          if [ "$deleted" -gt 0 ]; then
            echo "Cleared $deleted Python cache(s) ✅" \
              >> "$GITHUB_STEP_SUMMARY"
          elif [ "$failed" -eq 0 ]; then
            echo "No Python caches found to clear 💬" \
              >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$failed" -ne 0 ]; then
            echo "Cache clearing completed with errors ❌" \
              >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  python-build:
    name: 'Python Build'
    needs: 'clear-cache'
    if: ${{ always() && !cancelled() }}
    runs-on: 'ubuntu-latest'
    outputs:
      matrix_json: "${{ steps.python-build.outputs.matrix_json }}"
      artefact_name: "${{ steps.python-build.outputs.artefact_name }}"
      artefact_path: "${{ steps.python-build.outputs.artefact_path }}"
    permissions:
      contents: read
    timeout-minutes: 12
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: 'Build Python project'
        id: python-build
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-build-action@5f570d5d17a7315074a824a91c6a705b6fc5c7dd  # v1.1.2

  python-tests:
    name: 'Python Tests'
    runs-on: 'ubuntu-latest'
    needs: 'python-build'
    if: ${{ !cancelled() && needs.python-build.result == 'success' }}
    # Matrix job
    strategy:
      fail-fast: false
      matrix: "${{ fromJson(needs.python-build.outputs.matrix_json) }}"
    permissions:
      contents: read
    timeout-minutes: 12
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: "Python tests [pytest] ${{ matrix.python-version }}"
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-test-action@4129c285f63e4d004b9e615b881f44cd63ba5f45  # v1.2.0
        with:
          python_version: ${{ matrix.python-version }}
        env:
          # CPython 3.14 strict AST validation breaks pytest assertion
          # rewriting; disable until pytest upstream fixes the issue
          # yamllint disable-line rule:line-length
          PYTEST_ADDOPTS: "${{ startsWith(matrix.python-version, '3.14') && '--assert=plain' || '' }}"

  python-audit:
    name: 'Python Audit'
    runs-on: 'ubuntu-latest'
    needs: 'python-build'
    if: ${{ !cancelled() && needs.python-build.result == 'success' }}
    # Matrix job
    strategy:
      fail-fast: false
      matrix: "${{ fromJson(needs.python-build.outputs.matrix_json) }}"
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: "Audit dependencies ${{ matrix.python-version }}"
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-audit-action@fcb1b2e0cdbe19edf11057e598138f3d57f2b249  # v0.3.1
        with:
          python_version: "${{ matrix.python-version }}"
          permit_fail: "${{ vars.NO_BLOCK_AUDIT_FAIL == 'true' }}"
          # pip CVE-2026-3219: concatenated tar/ZIP handling in pip
          # itself (runner tooling, not project dependency)
          ignore_vulns: 'GHSA-58qw-9mgm-455v'

  sbom:
    name: 'Generate SBOM'
    runs-on: ubuntu-latest
    needs: 'python-build'
    if: ${{ !cancelled() && needs.python-build.result == 'success' }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: "Generate SBOM"
        id: sbom
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-sbom-action@60648e3351a48617d40f68ccb1f143e050f74c96  # v0.1.1
        with:
          include_dev: "false"
          sbom_format: "both"

      - name: "Upload SBOM artifacts"
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-files
          path: |
            sbom-cyclonedx.json
            sbom-cyclonedx.xml
          retention-days: 45

      - name: "SBOM summary"
        run: |
            # SBOM summary
            {
              echo "## SBOM Summary"
              echo "SBOM count: ${{ steps.sbom.outputs.component_count }}"
              echo "Tool used: ${{ steps.sbom.outputs.dependency_manager }}"
            } >> "$GITHUB_STEP_SUMMARY"

  grype:
    name: 'Grype Audit SBOM'
    runs-on: ubuntu-latest
    needs: 'sbom'
    if: ${{ !cancelled() && needs.sbom.result == 'success' }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: "Download SBOM artefact"
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sbom-files

      - name: "Install Grype"
        id: grype
        # yamllint disable-line rule:line-length
        uses: anchore/scan-action/download-grype@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        with:
          cache-db: "true"

      - name: "Grype audit SBOM"
        id: grype-audit
        env:
          GRYPE_CMD: "${{ steps.grype.outputs.cmd }}"
          NO_BLOCK_AUDIT_FAIL: >-
            ${{ vars.NO_BLOCK_AUDIT_FAIL == 'true' }}
        run: |
            # Run grype once, emitting all three output formats
            # Render the human-readable table in this step's log
            set +e
            "${GRYPE_CMD}" \
              -o "sarif=grype-results.sarif" \
              -o "json=grype-results.json" \
              -o "table=grype-results.txt" \
              --fail-on medium \
              -c .grype.yaml \
              "sbom:sbom-cyclonedx.json"
            grype_exit=$?
            set -e

            echo "--- Grype scan results ---"
            if [ -f grype-results.txt ]; then
              cat grype-results.txt
            else
              echo "No table output produced"
            fi

            if [ "${grype_exit}" = "0" ]; then
              echo "No vulnerabilities at or above 'medium'"
              exit 0
            fi
            if [ "${grype_exit}" != "2" ]; then
              echo "::error::Grype exited with code ${grype_exit}"
              exit "${grype_exit}"
            fi

            if [ "${NO_BLOCK_AUDIT_FAIL}" = "true" ]; then
              echo "::warning::Grype found vulnerabilities at or" \
                "above the 'medium' threshold, but" \
                "NO_BLOCK_AUDIT_FAIL is set so the job will not" \
                "fail."
              exit 0
            fi
            echo "::error::Grype found vulnerabilities at or above" \
              "the 'medium' severity threshold. See the table" \
              "above for the offending packages and CVEs."
            exit 1

      - name: "Upload Grype scan results"
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: grype-scan-results
          path: |
            grype-results.sarif
            grype-results.json
            grype-results.txt
          retention-days: 90
          if-no-files-found: warn

      - name: "Grype summary"
        if: always()
        run: |
            # Render a Markdown table of output in step summary.
            {
              echo "## Grype Vulnerability Scan"
              echo ""
              if [ ! -f grype-results.json ]; then
                echo "No scan results available"
                exit 0
              fi
              match_count=$(jq '.matches | length' grype-results.json)
              if [ "${match_count}" = "0" ]; then
                echo "No vulnerabilities found at or above the" \
                  "configured severity threshold."
                exit 0
              fi
              echo "Found ${match_count} matching Grype record(s)."
              echo ""
              echo "| Package | Installed | Fixed In | Type |" \
                "Vulnerability | Severity | EPSS | Risk |"
              echo "| --- | --- | --- | --- | --- | --- | --- | --- |"
              jq -r '
                def esc: tostring | gsub("\\|"; "\\|");
                def round2: (. * 100 | round) / 100;
                def epss_pct:
                  ( .vulnerability.epss // [] ) as $e
                  | if ($e | length) == 0 then "-"
                    else ( $e[0].epss // 0 ) as $p
                      | if $p == 0 then "0%"
                        elif ($p * 100) < 0.01 then "<0.01%"
                        else ( ($p * 100) | round2 | tostring
                               + "%" ) end
                    end;
                def risk_fmt:
                  .vulnerability.risk
                  | if . == null then "-"
                    elif type == "number" then
                      (round2 | tostring)
                    else (. | tostring) end;
                .matches[] |
                [ (.artifact.name // "-" | esc),
                  (.artifact.version // "-" | esc),
                  ( ( .vulnerability.fix.versions // [] )
                    | if length == 0 then "-"
                      else join(", ") end | esc ),
                  (.artifact.type // "-" | esc),
                  (.vulnerability.id // "-" | esc),
                  (.vulnerability.severity // "-" | esc),
                  epss_pct,
                  risk_fmt
                ] | "| " + join(" | ") + " |"
              ' grype-results.json
            } >> "$GITHUB_STEP_SUMMARY"
