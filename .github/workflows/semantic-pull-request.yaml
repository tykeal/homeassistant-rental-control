name: 'Semantic Pull Request 🛠️'

# yamllint disable-line rule:truthy
on:
  # Not supported when workflow contains: amannn/action-semantic-pull-request
  # workflow_dispatch:
  pull_request:
    types: [opened, reopened, edited, synchronize]

permissions: {}

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  semantic-pull-request:
    name: "Semantic Pull Request"
    # Delegate to the shared reusable workflow, which tolerates Dependabot's
    # truncated single-commit subjects for long dependency names that
    # otherwise trip validateSingleCommitMatchesPrTitle.
    # yamllint disable-line rule:line-length
    uses: lfit/releng-reusable-workflows/.github/workflows/reuse-semantic-pull-request.yaml@5fa62e396473e823e2bb0f45b744e94c4f842faa  # v0.7.4
    permissions:
      contents: read
      pull-requests: read  # Gate step queries the PR API (avoids 403)
