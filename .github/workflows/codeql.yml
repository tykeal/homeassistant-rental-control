name: 'CodeQL'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches: ['main']
    paths-ignore:
      - 'docs/**'
  pull_request:
    branches: ['main']
  schedule:
    - cron: '26 16 * * 2'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  scan:
    name: 'Audit Repository'
    # yamllint disable-line rule:line-length
    uses: lfit/releng-reusable-workflows/.github/workflows/reuse-python-codeql.yaml@fd3c1b43bc919e9e70787b009ffa2768ddbb1267  # v0.7.2
    with:
      codeql_config: .github/codeql/codeql-config.yml
    permissions:
      security-events: write  # Upload CodeQL results to code scanning.
      # required to fetch internal or private CodeQL packs
      packages: read  # Fetch internal or private CodeQL packs.
      # only required for workflows in private repositories
      actions: read  # Read workflow metadata (private repos only).
      contents: read  # Check out the repository to analyze.
